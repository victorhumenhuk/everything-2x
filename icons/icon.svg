<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d7c6b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Double-speed arrows (fast-forward symbol) -->
  <g fill="#ffffff" transform="translate(256, 240)">
    <!-- Left arrow -->
    <polygon points="-120,-72 -16,0 -120,72" opacity="0.92"/>
    <!-- Right arrow -->
    <polygon points="-16,-72 88,0 -16,72" opacity="0.92"/>
  </g>

  <!-- "2x" text -->
  <text
    x="256"
    y="390"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="96"
    font-weight="800"
    fill="#ffffff"
    opacity="0.95"
    letter-spacing="-2"
  >2x</text>
</svg>
