name: Verify extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          jq empty manifest.json
          echo "Manifest is valid JSON"

      - name: Check forbidden permissions are absent
        run: |
          for perm in tabs activeTab scripting webNavigation cookies webRequest; do
            if jq -e --arg p "$perm" '.permissions[]? | select(. == $p)' manifest.json; then
              echo "ERROR: forbidden permission '$perm' found in manifest"
              exit 1
            fi
          done
          echo "No forbidden permissions"

      - name: Check version is set
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: version not set in manifest"
            exit 1
          fi
          echo "Version: $VERSION"

      - name: Check no funding-link references remain
        run: |
          BLOCKED_PATTERN="(ko[-]?fi|d[o]nat(e|ion|ing)?|supp[o]rt development|supp[o]rt me|buy me a c[o]ffee|buymeac[o]ffee|tip[[:space:]]jar|tipj[a]r|sp[o]nsor|p[a]treon|p[a]ypal[.]me|github sp[o]nsors)"
          if grep -ri -E "${BLOCKED_PATTERN}" \
              --include="*.js" --include="*.html" --include="*.css" \
              --include="*.json" --include="*.md" \
              --exclude-dir=".git" --exclude-dir="node_modules" .; then
            echo "ERROR: funding-link references still present"
            exit 1
          fi
          echo "No funding-link references found"

      - name: Validate JS syntax
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*"); do
            node --check "$f"
          done

      - name: Confirm icons exist
        run: |
          for size in 16 32 48 128; do
            if [ ! -f "icons/icon-${size}.png" ]; then
              echo "ERROR: missing icons/icon-${size}.png"
              exit 1
            fi
          done
