name: Verify extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          jq empty manifest.json
          echo "Manifest is valid JSON"

      - name: Check for forbidden permissions
        run: |
          if jq -e '.permissions[]? | select(. == "tabs")' manifest.json; then
            echo "ERROR: 'tabs' permission found in manifest"
            exit 1
          fi
          echo "No forbidden permissions"

      - name: Check version is set
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: version not set in manifest"
            exit 1
          fi
          echo "Version: $VERSION"

      - name: Validate JS syntax
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*"); do
            node --check "$f"
          done

      - name: Confirm icons exist
        run: |
          for size in 16 32 48 128; do
            if [ ! -f "icons/icon-${size}.png" ]; then
              echo "ERROR: missing icons/icon-${size}.png"
              exit 1
            fi
          done
